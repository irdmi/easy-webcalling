<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serverless Video Call</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0c0c0c;
      color: #e0e0e0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      position: relative;
    }
    .status-badge {
      background: #1e1e1e;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 14px;
      color: #a0a0a0;
      margin-bottom: 24px;
      border: 1px solid #2a2a2a;
      transition: all 0.3s ease;
    }
    .video-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      width: 100%;
      max-width: 900px;
    }
    video {
      width: 300px;
      max-width: 45%;
      background: #1a1a1a;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      border: 1px solid #333;
      transition: transform 0.2s ease;
    }
    video:hover { transform: scale(1.02); }
    .controls { margin-top: 24px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    button {
      background: #2a2a2a;
      border: none;
      color: #e0e0e0;
      padding: 12px 28px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #3a3a3a;
    }
    button:hover { background: #3a3a3a; border-color: #555; }
    button.primary { background: #2e7d32; border-color: #4caf50; }
    button.primary:hover { background: #3e8e41; }
    button.blue { background: #1a3a5c; border-color: #2196F3; }
    button.blue:hover { background: #1e4a6e; }
    button.active-mute {
      background: #b71c1c;
      border-color: #e53935;
    }
    .checkbox-label {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; font-size: 14px; color: #b0b0b0; margin: 10px 0;
    }
    .checkbox-label input { accent-color: #4caf50; width: 18px; height: 18px; }
    input[type="text"] {
      background: #1e1e1e; border: 1px solid #333; color: white;
      padding: 12px 16px; border-radius: 12px; font-size: 15px;
      width: 240px; text-align: center; outline: none; transition: border 0.3s;
    }
    input[type="text"]:focus { border-color: #4caf50; }
    .hidden { display: none !important; }
    .sidebar {
      width: 320px; background: #121212; border-left: 1px solid #242424;
      padding: 24px 20px; display: flex; flex-direction: column; gap: 20px;
      overflow-y: auto; box-shadow: -8px 0 24px rgba(0,0,0,0.4); z-index: 10;
    }
    .info-card {
      background: #1e1e1e; border-radius: 16px; padding: 16px;
      border: 1px solid #2a2a2a; transition: background 0.2s;
    }
    .info-card:hover { background: #242424; }
    .info-card h3 {
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px;
      color: #888; margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
    }
    .info-card .value {
      font-family: 'JetBrains Mono', monospace; font-size: 14px;
      word-break: break-all; color: #b0b0b0;
    }
    .candidate-ip { color: #81c784; }
    .candidate-type {
      display: inline-block; background: #2a2a2a; border-radius: 6px;
      padding: 2px 8px; font-size: 12px; margin-left: 6px; color: #ffb74d;
    }
    @media (max-width: 768px) {
      body {
        flex-direction: column;
        height: auto;
        overflow-y: auto;
      }
      .sidebar {
        width: 100%;
        height: auto;
        border-left: none;
        border-top: 1px solid #242424;
      }
      .main-panel {
        height: auto;
        padding: 20px 10px;
      }
      video {
        width: 90%;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="main-panel">
    <div class="status-badge" id="statusText">Create a room or open a friend's link</div>

    <div id="createBlock">
      <button class="primary" id="createBtn">🔮 Create Call</button>
      <label class="checkbox-label">
        <input type="checkbox" id="protectCheckbox">
        Protect with password
      </label>
    </div>

    <div id="createdInfo" class="hidden">
      <div class="status-badge">✅ Room created</div>
      <div id="passwordLine" class="hidden" style="margin: 8px 0;">
        <span style="color:#aaa;">Password:</span>
        <span id="passwordDisplay" style="font-family: monospace; background:#1e1e1e; padding:4px 12px; border-radius:8px; margin-left:6px;"></span>
      </div>
      <div class="controls">
        <button class="blue" id="copyBtn">📋 Copy Link</button>
      </div>
      <p style="color:#777; font-size:13px; margin-top:12px;">Send the link to your friend. If password is set, share it separately.</p>
    </div>

    <div id="joinBlock" class="hidden">
      <div class="status-badge">🔐 This room is password protected</div>
      <input type="text" id="passwordInput" placeholder="Enter password" autofocus>
      <button class="blue" id="joinBtn" style="margin-top:12px;">🔓 Join</button>
    </div>

    <div class="video-container">
      <video id="localVideo" autoplay muted playsinline></video>
      <!-- Удалённому видео добавлен muted для автозапуска на мобильных -->
      <video id="remoteVideo" autoplay playsinline muted></video>
    </div>

    <!-- Media control buttons (initially hidden, shown after call starts) -->
    <div id="mediaControls" class="controls hidden">
      <button id="toggleMicBtn">🎤 Mute Mic</button>
      <button id="toggleCamBtn">📷 Mute Cam</button>
    </div>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="info-card">
      <h3>🖥️ My local IP</h3>
      <div class="value" id="localIp">...</div>
    </div>
    <div class="info-card">
      <h3>🌐 Remote candidates</h3>
      <div id="remoteCandidates" class="value">Waiting...</div>
    </div>
    <div class="info-card">
      <h3>🧊 ICE connection state</h3>
      <div class="value" id="iceState">—</div>
    </div>
    <div class="info-card">
      <h3>🔗 Peer connection state</h3>
      <div class="value" id="connState">—</div>
    </div>
  </div>

  <!-- PeerJS from CDN (global 'Peer') -->
  <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
  <script>
    // ===== 1. Hijack RTCPeerConnection to display connection details =====
    const remoteCandidatesDiv = document.getElementById('remoteCandidates');
    const iceStateSpan = document.getElementById('iceState');
    const connStateSpan = document.getElementById('connState');
    const OriginalRTCPeerConnection = window.RTCPeerConnection;

    window.RTCPeerConnection = function(config) {
      const pc = new OriginalRTCPeerConnection(config);
      pc.addEventListener('icecandidate', (e) => {
        if (e.candidate) {
          const ip = e.candidate.address || e.candidate.candidate?.split(' ')[4] || '?';
          const type = e.candidate.type || e.candidate.candidate?.split(' ')[7] || '?';
          const entry = document.createElement('div');
          entry.style.marginBottom = '6px';
          entry.innerHTML = `<span class="candidate-ip">${ip}</span><span class="candidate-type">${type}</span>`;
          remoteCandidatesDiv.appendChild(entry);
        }
      });
      pc.addEventListener('iceconnectionstatechange', () => {
        iceStateSpan.textContent = pc.iceConnectionState;
      });
      pc.addEventListener('connectionstatechange', () => {
        connStateSpan.textContent = pc.connectionState;
      });
      return pc;
    };
    window.RTCPeerConnection.prototype = OriginalRTCPeerConnection.prototype;

    // ===== 2. Show local IP via temporary RTCPeerConnection =====
    async function showLocalIP() {
      const pc = new OriginalRTCPeerConnection({ iceServers: [] });
      pc.createDataChannel('dummy');
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      pc.onicecandidate = (e) => {
        if (e.candidate) {
          const ip = e.candidate.address || e.candidate.candidate?.split(' ')[4];
          if (ip) document.getElementById('localIp').textContent = ip;
        }
      };
      setTimeout(() => pc.close(), 2000);
    }
    showLocalIP();

    // ===== 3. Core app with PeerJS =====
    const statusText = document.getElementById('statusText');
    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const createBtn = document.getElementById('createBtn');
    const copyBtn = document.getElementById('copyBtn');
    const joinBtn = document.getElementById('joinBtn');
    const passwordInput = document.getElementById('passwordInput');
    const protectCheckbox = document.getElementById('protectCheckbox');
    const createBlock = document.getElementById('createBlock');
    const createdInfo = document.getElementById('createdInfo');
    const joinBlock = document.getElementById('joinBlock');
    const passwordLine = document.getElementById('passwordLine');
    const passwordDisplay = document.getElementById('passwordDisplay');

    // Media control elements
    const mediaControls = document.getElementById('mediaControls');
    const toggleMicBtn = document.getElementById('toggleMicBtn');
    const toggleCamBtn = document.getElementById('toggleCamBtn');

    let localPeer = null;
    let localStream = null;
    let isMicMuted = false;
    let isCamMuted = false;

    // Generate random ID (used as PeerJS ID)
    function generateFullId() {
      const bytes = crypto.getRandomValues(new Uint8Array(18));
      return btoa(String.fromCharCode(...bytes))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    function splitId(fullId) {
      return { prefix: fullId.slice(0, 6), secret: fullId.slice(6) };
    }

    // Helper: activate remote video (unmute and play)
    function playRemoteStream(stream) {
      remoteVideo.srcObject = stream;
      // Снимаем mute после прикрепления потока, чтобы включить звук
      remoteVideo.muted = false;
      remoteVideo.play().catch(e => console.warn('play() failed, but video may still render:', e));
    }

    // Initialize PeerJS and media
    async function initPeer(peerId) {
      localPeer = new Peer(peerId, {
        host: '0.peerjs.com',
        port: 443,
        secure: true,
        debug: 0
      });

      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      localVideo.srcObject = localStream;

      // Show media controls
      mediaControls.classList.remove('hidden');

      // If we are the initiator, we will wait for incoming call
      localPeer.on('call', async (call) => {
        statusText.textContent = 'Incoming call, answering...';
        call.answer(localStream);
        call.on('stream', (remoteStream) => {
          playRemoteStream(remoteStream);
          statusText.textContent = '✅ Call active';
        });
      });

      localPeer.on('error', (err) => {
        statusText.textContent = 'Peer error: ' + err.message;
      });
    }

    async function makeCall(remoteId) {
      statusText.textContent = 'Calling peer...';
      const call = localPeer.call(remoteId, localStream);
      call.on('stream', (remoteStream) => {
        playRemoteStream(remoteStream);
        statusText.textContent = '✅ Call active';
      });
      call.on('error', (err) => {
        statusText.textContent = 'Call error: ' + err.message;
      });
    }

    // ----- Mute toggle functions -----
    function toggleMic() {
      if (!localStream) return;
      const audioTrack = localStream.getAudioTracks()[0];
      if (!audioTrack) return;
      isMicMuted = !isMicMuted;
      audioTrack.enabled = !isMicMuted;
      toggleMicBtn.textContent = isMicMuted ? '🔇 Unmute Mic' : '🎤 Mute Mic';
      toggleMicBtn.classList.toggle('active-mute', isMicMuted);
    }

    function toggleCam() {
      if (!localStream) return;
      const videoTrack = localStream.getVideoTracks()[0];
      if (!videoTrack) return;
      isCamMuted = !isCamMuted;
      videoTrack.enabled = !isCamMuted;
      toggleCamBtn.textContent = isCamMuted ? '📷 Unmute Cam' : '📷 Mute Cam';
      toggleCamBtn.classList.toggle('active-mute', isCamMuted);
    }

    // Attach media button listeners
    toggleMicBtn.addEventListener('click', toggleMic);
    toggleCamBtn.addEventListener('click', toggleCam);

    // ===== 4. Start call with roles =====
    function startCall(fullId, asInitiator) {
      const initiatorId = fullId + '-i';
      const joinerId = fullId + '-j';
      const myId = asInitiator ? initiatorId : joinerId;
      const remoteId = asInitiator ? joinerId : initiatorId;

      initPeer(myId).then(() => {
        if (!asInitiator) {
          // Joiner: make call to initiator
          makeCall(remoteId);
        } else {
          statusText.textContent = 'Waiting for someone to join...';
        }
      });
    }

    // Parse initial hash
    (function() {
      const hash = location.hash.slice(1);
      if (hash && hash.length >= 6) {
        if (hash.length > 6) {
          // Full ID, no password
          createBlock.classList.add('hidden');
          startCall(hash, false);
        } else {
          // Short prefix, need password
          createBlock.classList.add('hidden');
          joinBlock.classList.remove('hidden');
        }
      }
    })();

    // ===== 5. Button handlers =====
    createBtn.addEventListener('click', () => {
      const fullId = generateFullId();
      const protect = protectCheckbox.checked;
      if (protect) {
        const { prefix, secret } = splitId(fullId);
        location.hash = prefix;
        passwordDisplay.textContent = secret;
        passwordLine.classList.remove('hidden');
      } else {
        location.hash = fullId;
        passwordLine.classList.add('hidden');
      }
      createBlock.classList.add('hidden');
      createdInfo.classList.remove('hidden');
      joinBlock.classList.add('hidden');
      startCall(fullId, true);
    });

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(location.href).then(() => {
        statusText.textContent = '📋 Link copied!';
        setTimeout(() => {
          if (statusText.textContent === '📋 Link copied!') {
            statusText.textContent = 'Waiting for someone to join...';
          }
        }, 2000);
      });
    });

    joinBtn.addEventListener('click', () => {
      const secret = passwordInput.value.trim();
      if (!secret) return;
      const prefix = location.hash.slice(1);
      const fullId = prefix + secret;
      joinBlock.classList.add('hidden');
      startCall(fullId, false);
    });
  </script>
</body>
</html>
